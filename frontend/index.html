<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toddle Notes</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Notes App</h1>

    <form id="noteForm">

        <input
            type="text"
            id="title"
            placeholder="Title"
            required
        >

        <br><br>

        <textarea
            id="content"
            placeholder="Content"
            required
        ></textarea>

        <br><br>

        <button type="submit">
            Add Note
        </button>

    </form>

    <hr>

    <div id="notes"></div>

    <script src="app.js"></script>

</body>
</html>
